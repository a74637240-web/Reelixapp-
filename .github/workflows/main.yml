name: Build Original Release APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps
          npm install --no-save @tailwindcss/oxide-linux-x64-gnu --legacy-peer-deps

      - name: Build Web Application
        run: npm run build --if-present

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Android
        run: |
          if [ -d "android" ]; then
            npx cap android update || true
            npx cap sync android || true
          else
            echo "Android folder missing, creating one..."
            npx cap add android || true
            npx cap sync android || true
          fi

      - name: Grant Execute Permission to Gradlew
        run: |
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Original Signing Key
        run: |
          if [ ! -f "reels-release.keystore" ]; then
            keytool -genkey -v -keystore reels-release.keystore -alias reels-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "MySecurePass123" -keypass "MySecurePass123" -dname "CN=Arun, O=ReelsApp, C=IN"
          fi

      - name: Build Original Signed Release APK
        run: |
          if [ -d "android" ]; then
            cd android
            ./gradlew assembleRelease
            
            # ऐप को असली चाभी से लॉक (Sign) करना
            $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks ../reels-release.keystore --ks-key-alias reels-alias --ks-pass pass:"MySecurePass123" --key-pass pass:"MySecurePass123" --out app-release-signed.apk app/build/outputs/apk/release/app-release-unsigned.apk
          else
            echo "Cannot build: Android folder not found."
            exit 1
          fi

      - name: Upload Original Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Reels-Original-Release-APK
          path: android/app-release-signed.apk
          
